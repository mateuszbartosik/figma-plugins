  *,*::before,*::after{box-sizing:border-box;}
  :root{
    --page:#F4F4F9;
    --surface:#FFFFFF; --surface-2:#F5F5FB; --track:#EBEBF2;
    --text:#17161F; --text-2:#6B6979; --text-3:#9B99A9;
    --border:rgba(22,20,50,.09); --border-2:rgba(22,20,50,.16);
    --hover:#F5F5FB;
    --violet:#7C5CFF; --violet-ink:#5B3FD6;
    --rose:#F0396B; --rose-ink:#C81E52;
    --amber:#E08600; --amber-ink:#B26A00;
    --mint:#0FB981;
    --blue:#2E90FA; --blue-ink:#175CD3;
    --grad:linear-gradient(135deg,#A45CFF 0%,#6C5CFF 50%,#4D8AFF 100%);
    --mono:'Geist Mono',ui-monospace,Menlo,Consolas,monospace;
    --sans:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    --shadow-card:0 1px 2px rgba(24,20,50,.04),0 6px 16px -10px rgba(40,34,90,.14);
  }
  body{background:
      radial-gradient(80% 50% at 12% -2%,rgba(124,92,255,.07),transparent 60%),
      radial-gradient(70% 50% at 100% 102%,rgba(77,138,255,.06),transparent 55%),
      var(--page);
    font-family:var(--sans); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased;
    display:flex; align-items:flex-start; justify-content:center; padding:0; margin:0;}

  .panel{position:relative; width:404px; max-width:100%; height:100vh;
    display:flex; flex-direction:column; border-radius:0; overflow:hidden;
    background:var(--surface); border:1px solid var(--border);
    box-shadow:0 1px 3px rgba(24,20,50,.05),0 30px 70px -28px rgba(46,38,100,.30);
    animation:rise .5s cubic-bezier(.2,.7,.2,1) both;}
  .glow{position:absolute; inset:0 0 auto 0; height:160px; pointer-events:none; z-index:1;
    background:linear-gradient(180deg,rgba(124,92,255,.10),rgba(124,92,255,0) 78%);}
  .pad{position:relative; z-index:2; padding:18px 16px 0; flex:1; min-height:0; display:flex; flex-direction:column;}
  .head,.scope,.metrics,.foot{flex-shrink:0;}

  .head{display:flex; align-items:center; gap:11px; margin-bottom:16px;}
  .logo{width:38px; height:38px; border-radius:11px; background:var(--grad); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; color:#fff;
    box-shadow:0 6px 15px -4px rgba(108,92,255,.55),0 1px 0 rgba(255,255,255,.4) inset;}
  .htxt{flex:1; min-width:0;}
  .app-title{font-size:15px; font-weight:600; letter-spacing:-.015em;}
  .app-sub{font-size:11px; color:var(--text-2); margin-top:1px; letter-spacing:-.005em;}
  .icon-btn{width:34px; height:34px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface); color:var(--text-2); cursor:pointer; display:flex;
    align-items:center; justify-content:center; transition:.15s; box-shadow:var(--shadow-card);}
  .icon-btn:hover{color:var(--text); border-color:var(--border-2);}
  .icon-btn:active{transform:scale(.95);}

  .scope{display:flex; gap:3px; padding:3px; border-radius:12px; background:var(--track); margin-bottom:14px;}
  .seg{flex:1; padding:7px 0; border:0; border-radius:9px; background:transparent; cursor:pointer;
    font-family:inherit; font-size:12px; font-weight:500; color:var(--text-2); transition:.18s;}
  .seg:hover{color:var(--text);}
  .seg.active{color:var(--text); background:var(--surface);
    box-shadow:0 1px 3px rgba(24,20,50,.14),0 0 0 .5px rgba(22,20,50,.04);}

  .metrics{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .chip{background:var(--surface-2); border:1px solid var(--border); border-radius:14px; padding:11px 12px;}
  .chip .lab{display:flex; align-items:center; gap:6px; font-size:10px; letter-spacing:.06em;
    text-transform:uppercase; color:var(--text-2); font-weight:500;}
  .dot{width:7px; height:7px; border-radius:50%;}
  .chip .num{font-size:23px; font-weight:600; margin-top:5px; font-variant-numeric:tabular-nums; letter-spacing:-.03em;}

  .hidden{display:none!important;}
  .empty-state{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:13px;padding:28px 24px;}
  .empty-icon{width:54px;height:54px;border-radius:16px;background:rgba(124,92,255,.1);color:var(--violet);display:flex;align-items:center;justify-content:center;}
  .empty-title{font-size:15px;font-weight:600;}
  .empty-sub{font-size:12px;color:var(--text-2);line-height:1.55;max-width:250px;}
  .btn-primary{margin-top:4px;display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border:0;border-radius:12px;background:var(--grad);color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 10px 24px -10px rgba(108,92,255,.7);}
  .btn-primary:active{transform:scale(.98);}
  .btn-primary:disabled{opacity:.7;cursor:default;}

  .results{margin-top:14px; flex:1; min-height:0; overflow-y:auto; overflow-x:hidden; padding:1px;
    display:flex; flex-direction:column; gap:10px;}
  .results::-webkit-scrollbar{width:9px;}
  .results::-webkit-scrollbar-thumb{background:rgba(22,20,50,.16); border-radius:9px; border:3px solid transparent; background-clip:padding-box;}

  .card{background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden;
    flex-shrink:0; box-shadow:var(--shadow-card); animation:rise .5s cubic-bezier(.2,.7,.2,1) both;}
  .results .card:nth-child(2){animation-delay:.05s}
  .results .card:nth-child(3){animation-delay:.1s}
  .shead{width:100%; display:flex; align-items:center; gap:10px; padding:13px 14px; cursor:pointer;
    background:transparent; border:0; font-family:inherit; text-align:left; color:var(--text);}
  .sicon{width:28px; height:28px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}

    s.addEventListener('click', function () {
      document.querySelectorAll('.seg').forEach(function (x) { x.classList.remove('active'); });
      s.classList.add('active'); state.scope = scopes[i];
      updateScanLabel();
      // Before the first scan there's nothing to re-filter — just remember the scope
      // and let the eventual Scan click use it. After a scan exists, re-filter live.
      if (state.scanned) post({ type: 'set-scope', scope: state.scope });
    });
  });
  document.getElementById('btn-rescan').addEventListener('click', rescan);
  document.getElementById('btn-scan').addEventListener('click', rescan);
  function rescan() { setBusy(true); post({ type: 'scan', scope: state.scope }); }
  function setBusy(b) {
    document.getElementById('btn-rescan').classList.toggle('busy', b);
    var scanBtn = document.getElementById('btn-scan');
    scanBtn.disabled = b;
    scanBtn.textContent = b ? 'Scanning…' : 'Scan ' + state.scope;
  }
  function updateScanLabel() {
    var scanBtn = document.getElementById('btn-scan');
    if (!scanBtn.disabled) scanBtn.textContent = 'Scan ' + state.scope;
  }
  function setScanned(v) {
    state.scanned = v;
    document.getElementById('empty').classList.toggle('hidden', v);
    document.querySelector('.metrics').classList.toggle('hidden', !v);
    document.getElementById('results').classList.toggle('hidden', !v);
    document.querySelector('.foot .ok').classList.toggle('hidden', !v);
  }

  // --- settings dialog ---
  document.getElementById('btn-settings').addEventListener('click', function () {
    document.getElementById('settings').classList.add('show');
  });
  document.getElementById('settings-done').addEventListener('click', function () {
    document.getElementById('settings').classList.remove('show');
  });
  document.getElementById('settings').addEventListener('click', function (e) {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
  });
  document.querySelectorAll('.chk-check').forEach(function (cb) {
    cb.addEventListener('change', function () {
      state.checks[cb.dataset.check] = cb.checked;
      if (cb.dataset.check === 'hardcoded') {
        document.getElementById('setsub-hardcoded').classList.toggle('disabled', !state.checks.hardcoded);
      }
      if (state.scanned) setBusy(true); // pre-scan: just persist; a scan isn't triggered, so don't disable the Scan button
      post({ type: 'set-checks', checks: state.checks, props: state.props });
    });
  });
  document.querySelectorAll('.chk-prop').forEach(function (cb) {
    cb.addEventListener('change', function () {
      state.props[cb.dataset.prop] = cb.checked;
      if (state.scanned) setBusy(true);
      post({ type: 'set-checks', checks: state.checks, props: state.props });
    });
  });

  // --- accordion (delegated so it survives re-render) ---
  document.getElementById('results').addEventListener('click', function (e) {
    var head = e.target.closest('.shead'); if (head) head.closest('.card').classList.toggle('collapsed');
    var grow = e.target.closest('.grow');
    if (grow && !e.target.closest('.replace') && !e.target.closest('.mini')) grow.closest('.grp').classList.toggle('open');
  });

  window.onmessage = function (ev) {
    var m = ev.data.pluginMessage; if (!m) return;
    if (m.type === 'scan-result') { setBusy(false); setScanned(true); state.result = m.result; render(m.result); }
    else if (m.type === 'scan-progress') { setBusy(true); var fs = document.getElementById('foot-status'); if (fs) fs.textContent = 'Scanning… ' + m.scanned; }
    else if (m.type === 'candidates') showPicker(m);
    else if (m.type === 'action-result') { if (m.message) toast(m.message); }
    else if (m.type === 'error') { setBusy(false); toast(m.message); }
    else if (m.type === 'settings') {
      state.checks = m.checks;
      state.props = m.props || state.props;
      document.querySelectorAll('.chk-check').forEach(function (cb) { cb.checked = !!state.checks[cb.dataset.check]; });
      document.querySelectorAll('.chk-prop').forEach(function (cb) { cb.checked = !!state.props[cb.dataset.prop]; });
      document.getElementById('setsub-hardcoded').classList.toggle('disabled', !state.checks.hardcoded);
      if (state.result) render(state.result);
    }
  };

  function render(r) {
    document.getElementById('m-unused').textContent = r.summary.unused;
    document.getElementById('m-broken').textContent = r.summary.broken;
    document.getElementById('m-unlinked').textContent = r.summary.unlinked;
    document.getElementById('m-hardcoded').textContent = r.summary.hardcoded;
    var enabledChips = 0;
    ['unused', 'broken', 'unlinked', 'hardcoded'].forEach(function (k) {
      var chip = document.getElementById('chip-' + k);
      var on = !!state.checks[k];
      if (chip) chip.hidden = !on;
      if (on) enabledChips++;
    });
    var metricsEl = document.querySelector('.metrics');
    if (metricsEl) metricsEl.style.gridTemplateColumns = enabledChips === 4 ? 'repeat(2, 1fr)' : 'repeat(' + enabledChips + ', 1fr)';
    var scopeLabel = { selection: 'Selection', page: 'Page', document: 'Document' }[r.scope] || r.scope;
    var total = r.summary.unused + r.summary.broken + r.summary.unlinked + r.summary.hardcoded;
    var fs = document.getElementById('foot-status');
    if (fs) fs.innerHTML = 'Scanned <strong>' + esc(scopeLabel) + '</strong> · ' + total + ' issue' + (total === 1 ? '' : 's') + ' found';
    renderUnused(r.unused);
    renderBroken(r.broken);
    renderUnlinked(r.unlinked);
    renderHardcoded(r.hardcoded);
  }

  function sectionHeader(iconId, title, count, tint) {
    var h = el('button', 'shead');
    h.innerHTML =
      '<span class="sicon" style="background:' + tint.bg + ';color:' + tint.fg + '">' + icon(iconId) + '</span>' +
      '<span class="stitle">' + title + '</span>' +
      '<span class="count">' + count + '</span>' + icon('chevron', 'chev');
    return h;
  }
  var TINT = {
    violet: { bg: 'rgba(124,92,255,.12)', fg: 'var(--violet)' },
    rose:   { bg: 'rgba(240,57,107,.12)', fg: 'var(--rose)' },
    amber:  { bg: 'rgba(224,134,0,.12)',  fg: 'var(--amber)' },
    blue:   { bg: 'rgba(46,144,250,.12)', fg: 'var(--blue)' },
  };

  function renderUnused(list) {
    var card = document.getElementById('card-unused');
    if (!state.checks.unused) { card.hidden = true; return; }
    selectedUnused.clear();
    card.hidden = false; card.innerHTML = '';
    card.appendChild(sectionHeader('ghost', 'Unused variables', list.length, TINT.violet));
    var body = el('div', 'swrap'); var sb = el('div', 'sbody'); var inner = el('div', 'sbody-inner');
    inner.appendChild(el('div', 'caveat', icon('info') +
      '<p>Unused in this file only. If it’s published as a library, these may still be used elsewhere.</p>'));
    if (!list.length) {
      inner.appendChild(el('div', 'empty', 'No unused variables — nice.'));
    } else {
      var bulkbar = el('div', 'bulkbar',
        '<label class="selall"><input type="checkbox" id="sel-all">Select all</label>' +
        '<button class="btn-del-sel" id="del-sel" disabled>Delete selected</button>');
      inner.appendChild(bulkbar);
      var selAllChk = bulkbar.querySelector('#sel-all');
      var delSelBtn = bulkbar.querySelector('#del-sel');
      function updateBulk() {
        var n = selectedUnused.size;
        delSelBtn.disabled = n === 0;
        delSelBtn.textContent = n > 0 ? 'Delete selected (' + n + ')' : 'Delete selected';
      }
      selAllChk.addEventListener('change', function () {
        var checked = selAllChk.checked;
        inner.querySelectorAll('.row-chk').forEach(function (chk) {
          chk.checked = checked;
          if (checked) selectedUnused.add(chk.dataset.id); else selectedUnused.delete(chk.dataset.id);
        });
        updateBulk();
      });
      delSelBtn.addEventListener('click', function () {
        askConfirm('Delete ' + selectedUnused.size + ' variables?', 'This removes them from the file. You can undo in Figma.', function () {
          post({ type: 'delete-variables', ids: Array.from(selectedUnused) });
        });
      });
      list.forEach(function (v) {
        var row = el('div', 'row');
        var left = v.colorHex
          ? '<div class="swatch" style="background:' + v.colorHex + '"></div>'
          : '<div class="tglyph">' + (v.valuePreview.length <= 3 ? esc(v.valuePreview) : '#') + '</div>';
        row.innerHTML = '<input type="checkbox" class="row-chk" data-id="' + esc(v.id) + '">' + left +
          '<div class="rmain"><div class="rname">' + esc(v.name) + '</div><div class="rmeta">' + esc(v.collectionName) + ' · ' + cap(v.resolvedType) + '</div></div>' +
          '<div class="rval">' + esc(v.valuePreview) + '</div>' +
          '<div class="ract"><button class="mini danger" aria-label="Delete">' + icon('trash') + '</button></div>';
        row.querySelector('.row-chk').addEventListener('change', function (e) {
          if (e.target.checked) selectedUnused.add(v.id); else selectedUnused.delete(v.id);
          updateBulk();
        });
        row.querySelector('.mini').addEventListener('click', function () {
          askConfirm('Delete "' + v.name + '"?', 'This removes it from the file. You can undo in Figma.', function () {
            post({ type: 'delete-variables', ids: [v.id] });
          });
        });
        inner.appendChild(row);
      });
    }
    sb.appendChild(inner); body.appendChild(sb); card.appendChild(body);
  }

  function renderBroken(list) {
    var card = document.getElementById('card-broken');
    if (!state.checks.broken) { card.hidden = true; return; }
    card.hidden = false; card.innerHTML = '';
    card.appendChild(sectionHeader('triangle', 'Broken references', list.length, TINT.rose));
    var body = el('div', 'swrap'); var sb = el('div', 'sbody'); var inner = el('div', 'sbody-inner');
    if (!list.length) inner.appendChild(el('div', 'empty', 'No broken references.'));
    list.forEach(function (b) {
      var row = el('div', 'row');
      row.innerHTML =
        '<div class="tglyph" style="color:var(--rose)">' + icon('unlink') + '</div>' +
        '<div class="rmain"><div class="rname">' + esc(b.nodeName) + '</div><div class="rmeta">' + esc(fieldLabel(b.field)) + ' <span class="tag rose">missing</span></div></div>' +
        '<div class="ract"><span class="opage">' + esc(b.pageName) + '</span>' +
        '<button class="mini" aria-label="Detach binding" title="Detach binding">' + icon('unlink') + '</button>' +
        '<button class="mini" aria-label="Locate on canvas">' + icon('locate') + '</button></div>';
      var actBtns = row.querySelectorAll('.mini');
      actBtns[0].addEventListener('click', function () { post({ type: 'detach', nodeId: b.nodeId, field: b.field }); });
      actBtns[1].addEventListener('click', function () { markCurrent(row); post({ type: 'navigate', nodeId: b.nodeId, pageId: b.pageId }); });
      inner.appendChild(row);
    });
    sb.appendChild(inner); body.appendChild(sb); card.appendChild(body);
  }

  function renderUnlinked(groups) {
    var card = document.getElementById('card-unlinked');
    if (!state.checks.unlinked) { card.hidden = true; return; }
    card.hidden = false; card.innerHTML = '';
    var total = groups.reduce(function (s, g) { return s + g.count; }, 0);
    card.appendChild(sectionHeader('unplug', 'Unlinked library variables', total, TINT.blue));
    var body = el('div', 'swrap'); var sb = el('div', 'sbody'); var inner = el('div', 'sbody-inner');
    inner.appendChild(el('div', 'caveat blue', icon('info') +
      '<p>Bound to variables from libraries not enabled in this file.</p>'));
    if (!groups.length) {
      inner.appendChild(el('div', 'empty', 'No unlinked library variables.'));
    } else {
      groups.forEach(function (g) {
        var grp = el('div', 'grp');
        var left = '<div class="tglyph" style="color:var(--blue)">' + icon('unplug') + '</div>';
        var head = el('div', 'row grow');
        head.innerHTML = left +
          '<div class="rmain"><div class="rname">' + esc(g.collectionName) + '</div><div class="rmeta">' + g.count + ' layers</div></div>' +
          '<div class="ract">' + icon('chevron', 'grow-chev') + '</div>';
        grp.appendChild(head);
        var ow = el('div', 'occ-wrap'); var oc = el('div', 'occ'); var oi = el('div', 'occ-inner');
        g.refs.forEach(function (ref) {
          var orow = el('div', 'orow');
          orow.innerHTML = '<div class="obar"></div><span class="oname">' + esc(ref.nodeName) + '</span>' +
            '<span class="opage">' + esc(fieldLabel(ref.field)) + ' · ' + esc(ref.pageName) + '</span>' +
            '<button class="mini" aria-label="Locate">' + icon('locate') + '</button>';
          orow.querySelector('.mini').addEventListener('click', function () { markCurrent(orow); post({ type: 'navigate', nodeId: ref.nodeId, pageId: ref.pageId }); });
          oi.appendChild(orow);
        });
        oc.appendChild(oi); ow.appendChild(oc); grp.appendChild(ow); inner.appendChild(grp);
      });
    }
    sb.appendChild(inner); body.appendChild(sb); card.appendChild(body);
  }

  function renderHardcoded(groups) {
    var card = document.getElementById('card-hardcoded');
    if (!state.checks.hardcoded) { card.hidden = true; return; }
    card.hidden = false; card.innerHTML = '';
    var hardcodedTotal = groups.reduce(function (s, g) { return s + g.count; }, 0);
    card.appendChild(sectionHeader('code', 'Hardcoded values', hardcodedTotal, TINT.amber));
    var body = el('div', 'swrap'); var sb = el('div', 'sbody'); var inner = el('div', 'sbody-inner');
    groups.forEach(function (g) {
      var grp = el('div', 'grp');
      var left = g.colorHex ? '<div class="swatch" style="background:' + g.colorHex + '"></div>'
                            : '<div class="tglyph">' + esc(formatGlyph(g)) + '</div>';
      var rowMeta = g.category === 'color' ? 'Color · ' + g.count + ' layers' : g.count + ' layers';
      // A group is replaceable if ANY occurrence in it is (gradient-stop and shadow-
      // effect colors are navigate-only; a group only loses Replace when every
      // occurrence in it is one of those).
      var replaceable = g.occurrences.some(function (o) { return o.replaceable !== false; });
      var act = replaceable
        ? '<button class="replace">' + icon('swap') + 'Replace</button>'
        : '<span class="tag hint" title="Gradient and shadow colors can’t be bound to a variable yet — use Locate to review them.">' + esc(nonReplaceableLabel(g.occurrences)) + '</span>';
      var head = el('div', 'row grow');
      head.innerHTML = left +
        '<div class="rmain"><div class="rname">' + esc(g.label) + '</div><div class="rmeta">' + rowMeta + '</div></div>' +
        '<div class="ract">' + act + icon('chevron', 'grow-chev') + '</div>';
      if (replaceable) {
        head.querySelector('.replace').addEventListener('click', function (e) {
          e.stopPropagation(); state.pendingReplace = { category: g.category, valueKey: g.valueKey, label: g.label };
          post({ type: 'get-candidates', category: g.category, valueKey: g.valueKey });
        });
      }
      grp.appendChild(head);
      var ow = el('div', 'occ-wrap'); var oc = el('div', 'occ'); var oi = el('div', 'occ-inner');
      g.occurrences.forEach(function (o) {
        var orow = el('div', 'orow');
        orow.innerHTML = '<div class="obar"></div><span class="oname">' + esc(o.nodeName) + '</span><span class="opage">' + esc(o.pageName) + '</span>' +
          '<button class="mini" aria-label="Locate">' + icon('locate') + '</button>';
        orow.querySelector('.mini').addEventListener('click', function () { markCurrent(orow); post({ type: 'navigate', nodeId: o.nodeId, pageId: o.pageId }); });
        oi.appendChild(orow);
      });
      oc.appendChild(oi); ow.appendChild(oc); grp.appendChild(ow); inner.appendChild(grp);
    });
    if (!groups.length) inner.appendChild(el('div', 'empty', 'No hardcoded values in scope.'));
    sb.appendChild(inner); body.appendChild(sb); card.appendChild(body);
  }

  function esc(s) { return String(s).replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); }
  function cap(t) { return t.charAt(0) + t.slice(1).toLowerCase(); }
  function fieldLabel(f) {
    return ({
      fills: 'Fill', strokes: 'Stroke',
      cornerRadius: 'Corner radius',
      topLeftRadius: 'Top-left radius', topRightRadius: 'Top-right radius',
      bottomLeftRadius: 'Bottom-left radius', bottomRightRadius: 'Bottom-right radius',
      strokeWeight: 'Stroke weight',
      paddingLeft: 'Padding left', paddingRight: 'Padding right',
      paddingTop: 'Padding top', paddingBottom: 'Padding bottom',
      itemSpacing: 'Item spacing',
      fontSize: 'Font size', lineHeight: 'Line height', letterSpacing: 'Letter spacing', fontWeight: 'Font weight',
    })[f] || f;
  }
  function formatGlyph(g) { var n = g.num != null ? String(g.num) : '#'; return n.length <= 3 ? n : '#'; }
  // Label for a group whose occurrences are all navigate-only (see `replaceable` on Occurrence).
  function nonReplaceableLabel(occs) {
    var hasGradient = occs.some(function (o) { return String(o.field).indexOf('gradientStop') !== -1; });
    var hasEffect = occs.some(function (o) { return o.field === 'effects'; });
    if (hasGradient && hasEffect) return 'Gradient / shadow';
    if (hasEffect) return 'Shadow';
    if (hasGradient) return 'Gradient';
    return 'Navigate only';
  }
  function toast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(function () { t.classList.remove('show'); }, 2600); }

  function askConfirm(title, msg, onOk) {
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-msg').textContent = msg;
    var ov = document.getElementById('confirm');
    var okBtn = document.getElementById('confirm-ok');
    var cancelBtn = document.getElementById('confirm-cancel');
    function close() { ov.classList.remove('show'); okBtn.onclick = null; cancelBtn.onclick = null; }
    okBtn.onclick = function () { close(); onOk(); };
    cancelBtn.onclick = close;
    ov.classList.add('show');
  }

  function showPicker(m) {
    var pr = state.pendingReplace; if (!pr) return;
    var overlay = document.getElementById('picker');
    var body = document.getElementById('picker-body');
    document.getElementById('picker-title').textContent = 'Replace ' + pr.label;
    body.innerHTML = '';
    var exact = m.candidates.filter(function (c) { return c.exact; });
    var rest = m.candidates.filter(function (c) { return !c.exact; });
    function addRow(c) {
      var row = el('button', 'pick-row');
      var left = c.colorHex ? '<div class="swatch" style="background:' + c.colorHex + '"></div>' : '<div class="tglyph">' + esc(c.valuePreview) + '</div>';
      row.innerHTML = left + '<div class="rmain"><div class="rname">' + esc(c.name) + '</div><div class="rmeta">' + esc(c.collectionName) + (c.exact ? ' · <span class="tag exact">exact</span>' : '') + '</div></div>';
      row.addEventListener('click', function () {
        post({ type: 'replace', category: pr.category, valueKey: pr.valueKey, variableId: c.id });
        overlay.classList.remove('show'); state.pendingReplace = null;
      });
      body.appendChild(row);
    }
    if (exact.length) { body.appendChild(el('div', 'pick-label', 'Exact matches')); exact.forEach(addRow); }
    body.appendChild(el('div', 'pick-label', rest.length ? 'All ' + m.category + ' variables' : 'No local variables of this type'));
    rest.forEach(addRow);
    overlay.classList.add('show');
  }
  document.getElementById('picker-cancel').addEventListener('click', function () {
    document.getElementById('picker').classList.remove('show'); state.pendingReplace = null;
  });

  document.getElementById('empty-icon').innerHTML = icon('scan');
  setScanned(false); // open to the empty state; the user triggers the first scan
</script>
